<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}yume{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/reset.css">
    <link rel="stylesheet" href="/static/main.css">
</head>
<body>
    <header>
        <a href="/" class="header-title">yume webring</a>
        <a href="/random" class="btn">random site</a>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        made with &hearts; &nbsp;/&nbsp;
        <a href="https://github.com/whiskydumb/yume" target="_blank">source code</a>
    </footer>
    <div id="toast-container"></div>
    <script>
    (function() {
        var c = document.cookie.split('; ').find(function(s) { return s.startsWith('flash='); });
        if (!c) return;
        document.cookie = 'flash=; path=/; max-age=0';
        var v = decodeURIComponent(c.split('=')[1]);
        var type = v.substring(0, 2) === 's:' ? 'success' : 'error';
        var msg = v.substring(2);
        if (!msg) return;
        var el = document.createElement('div');
        el.className = 'toast toast-' + type;
        el.textContent = msg;
        document.getElementById('toast-container').appendChild(el);
        setTimeout(function() { el.classList.add('toast-hide'); }, 3000);
        setTimeout(function() { el.remove(); }, 3400);
    })();
    </script>
</body>
</html>

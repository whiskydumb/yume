{% extends "base.html" %}
{% block title %}join{% endblock %}
{% block content %}
        <div class="centered-form">
            <h2>join the ring</h2>
            <form method="POST" action="/apply">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="text" name="name" placeholder="site name" required>
                <input type="text" name="slug" placeholder="slug (e.g. my-site)" pattern="[a-z0-9\-]{3,50}" required>
                <input type="url" name="url" placeholder="https://your.site" required>
                <input type="text" name="description" placeholder="short description (optional)">
                <input type="text" name="contact" placeholder="contact (email, telegram, etc)" required>
                <button type="submit">submit</button>
            </form>
        </div>
{% endblock %}
